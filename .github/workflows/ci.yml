name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. scan code
  scan_code:
    name: Scan code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto . --error
      

  # 1 bis. scan_secrets
  scan_secrets:
    name: Scan secrets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. test
  test_code:
    name: Test code
    needs: [scan_code, scan_secrets]
    runs-on: ubuntu-latest
    steps:
      - run: echo "tests coming soon"
  # 3. build
  build_code:
    name: Build code
    needs: test_code
    runs-on: ubuntu-latest
    steps:
      - run: echo "build coming soon"
  # 4. scan image
  scan_image:
    name: Scan image
    needs: build_code
    runs-on: ubuntu-latest
    steps:
      - run: echo "trivy coming soon"
  # 5. push
  push_image:
    name: Push image
    needs: scan_image
    runs-on: ubuntu-latest
    steps:
      - run: echo "push coming soon"